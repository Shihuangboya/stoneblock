<!DOCTYPE html>
<html lang="zh_CN">
<head>
    <title>StoneBlock服务器 - 首页</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <mdui-top-app-bar scroll-behavior="elevate" variant="center-aligned">
        <mdui-button-icon icon="dns" class="showSnackBar"></mdui-button-icon>
        <mdui-top-app-bar-title>信息</mdui-top-app-bar-title>
        <mdui-button-icon icon="more_vert" class="openBtn"></mdui-button-icon>
    </mdui-top-app-bar>
    <h1 style="text-align: center">在这里查看您的个人信息</h1>
    <p style="text-align: center">个人信息</p>
    <div id="info">
        <center><mdui-card style="text-align: center; width:90%;" variant="outlined">
            <br >
            <mdui-avatar
                icon="android"
            >
            </mdui-avatar>
            <h4>您的信息</h4>
            <p>用户名：</p>
            <p id="showUsername">未登录</p>
            <p>注册邮箱：</p>
            <p id="showEmail">未登录</p>
            <p>注册时间：</p>
            <p id="showRegTime">未登录</p>
            <br>
            <mdui-button id="toLogin" color="primary" icon="login" style="display: none;">前往登录</mdui-button>
        </mdui-card></center>
    </div>
    <mdui-navigation-drawer placement="right" modal class="drawer" close-on-overlay-click>
        <!--mdui-button-icon icon="arrow_forward" class="closeBtn"></mdui-button-icon-->
        <mdui-list>
            <mdui-list-item icon="menu" nonclickable>侧边栏</mdui-list-item>
            <mdui-divider></mdui-divider>
            <mdui-list-item icon="reorder" href="#main">总概</mdui-list-item>
            <mdui-list-item icon="access_time" href="#recent">最近</mdui-list-item>
            <mdui-list-item icon="file_download" href="./register.html">注册</mdui-list-item>
            <mdui-list-item icon="achive" href="./login.html">登录</mdui-list-item>
        </mdui-list>
    </mdui-navigation-drawer> 
    <mdui-navigation-bar value="info">
        <mdui-navigation-bar-item icon="home" value="home" href="index.html">首页</mdui-navigation-bar-item>
        <mdui-navigation-bar-item icon="message" value="notice" href="notice.html">消息</mdui-navigation-bar-item>
        <mdui-navigation-bar-item icon="account_box" value="info" href="./info.html">个人信息</mdui-navigation-bar-item>
        <mdui-navigation-bar-item icon="money_off" active-icon="attach_money" href="./giveaway.html" value="giveaway">捐赠 StoneBlock</mdui-navigation-bar-item>
        <mdui-navigation-bar-item icon="bug_report" href="./rep_bug.html" value="bug_report">报告漏洞</mdui-navigation-bar-item>
    </mdui-navigation-bar>
    <mdui-snackbar delay="3000" class="snackbarDNS">别点啦～啥都没有</mdui-snackbar>
    <mdui-dialog
        close-on-overlay-click
        headline="关于“最近”卡片"
        description="因为我们并没有架设后端，所以我们没有办法动态更新“最近”卡片中的内容，必须通过您更新APP的版本才可以刷新“最近”卡片中的内容"
        icon="question_answer"
        class="about_recent"
    >
        <mdui-button icon="done" slot="action" class="close_about">好的</mdui-button>
    </mdui-dialog>
    <script>
        // 原有元素获取
        const openDrawerButton = document.querySelector(".openBtn");
        const Drawer = document.querySelector(".drawer");
        const showSnackbarBtn = document.querySelector(".showSnackBar");
        const SnackBarShowByDNS = document.querySelector(".snackbarDNS");
        const closeAbout = document.querySelector(".close_about");
        const aboutRecent = document.querySelector(".about_recent");
        // 新增：个人信息展示元素
        const showUsername = document.getElementById("showUsername");
        const showEmail = document.getElementById("showEmail");
        const showRegTime = document.getElementById("showRegTime");
        const toLogin = document.getElementById("toLogin");

        // 原有交互逻辑
        openDrawerButton.addEventListener("click", () => Drawer.open = true);
        showSnackbarBtn.addEventListener("click", () => SnackBarShowByDNS.open = true);
        // 修复openAbout未定义报错，增加判空处理
        if (window.openAbout) {
            openAbout.addEventListener("click", () => aboutRecent.open = true);
        }
        if (closeAbout) {
            closeAbout.addEventListener("click", () => aboutRecent.open = false);
        }

        // 新增：渲染登录用户信息核心逻辑
        function renderUserInfo() {
            // 读取login.html存储的当前登录用户信息
            const currentUser = JSON.parse(localStorage.getItem('currentLoginUser')) || null;
            if (currentUser) {
                // 已登录，展示用户信息
                showUsername.textContent = currentUser.username || "未知";
                showEmail.textContent = currentUser.email || "未知";
                showRegTime.textContent = currentUser.registerTime || "未知";
            } else {
                // 未登录，显示前往登录按钮并绑定跳转事件
                toLogin.style.display = "inline-block";
                toLogin.addEventListener("click", () => {
                    window.location.href = "./login.html";
                });
            }
        }

        // 页面加载时立即渲染用户信息
        window.onload = renderUserInfo;
    </script>
</body>
</html>
